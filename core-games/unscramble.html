<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unscramble Engine - ITIP 2.0</title>
    <style>
        /* ================= 核心測驗引擎基礎樣式 ================= */
        :root {
            --bg-color: #f4f7f6;
            --text-color: #2c3e50;
            --primary-color: #34495e;
            --chip-bg: #ffffff;
            --correct-color: #26890C;
            --wrong-color: #E21B3C;
        }

        body { 
            margin: 0; height: 100vh; font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-color); display: flex; flex-direction: column;
            overflow: hidden; user-select: none;
        }

        /* 頂部資訊列 */
        .game-header { 
            background: rgba(255, 255, 255, 0.95); padding: 15px 30px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; 
            justify-content: space-between; align-items: center; z-index: 100;
        }
        .back-btn { padding: 8px 16px; border: 1px solid #ccc; border-radius: 20px; background: white; cursor: pointer; font-weight: bold; }
        .status-board { display: flex; gap: 20px; font-size: 20px; font-weight: bold; }
        .active-team-red { color: #E21B3C; }
        .active-team-blue { color: #1cb0f6; }

        /* 遊戲主要區域 */
        #unscramble-container {
            flex-grow: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px; z-index: 10;
        }

        /* 題目提示區 (顯示中文或圖片) */
        #question-hint {
            font-size: clamp(24px, 5vw, 40px); font-weight: 900; color: #7f8c8d;
            margin-bottom: 30px; text-align: center;
        }

        /* 作答區 (放置已點擊的字母) */
        #answer-area {
            display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
            min-height: 80px; min-width: 300px; padding: 15px 30px;
            background: rgba(255, 255, 255, 0.5); border: 3px dashed #bdc3c7;
            border-radius: 15px; margin-bottom: 20px; transition: 0.3s;
        }
        #answer-area.correct { border-color: var(--correct-color); background: #e8f5e9; }
        #answer-area.wrong { border-color: var(--wrong-color); background: #ffebee; animation: shake 0.4s; }

        /* 字母方塊 (Chip) */
        .letter-chip {
            background-color: var(--chip-bg); color: var(--text-color);
            border: 3px solid #cbd5e1; border-radius: 12px;
            width: clamp(50px, 8vw, 70px); height: clamp(50px, 8vw, 70px);
            font-size: clamp(24px, 4vw, 36px); font-weight: bold; text-transform: uppercase;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; box-shadow: 0 4px 0 #cbd5e1; transition: 0.1s;
        }
        .letter-chip:active { transform: translateY(4px); box-shadow: 0 0 0 #cbd5e1; }
        
        /* 作答區內的方塊樣式微調 */
        #answer-area .letter-chip { border-color: var(--primary-color); box-shadow: 0 4px 0 var(--primary-color); }
        
        /* 字母來源區 (打亂的字母庫) */
        #source-area {
            display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;
            max-width: 800px; margin-bottom: 30px; min-height: 80px;
        }

        /* 輔助按鈕區 (退回/清空) */
        .controls { display: flex; gap: 20px; }
        .action-btn {
            padding: 12px 25px; font-size: 18px; font-weight: bold; cursor: pointer;
            border: none; border-radius: 10px; color: white; transition: 0.2s; box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }
        .action-btn:active { transform: translateY(4px); box-shadow: 0 0 0; }
        .btn-undo { background-color: #f39c12; }
        .btn-clear { background-color: #e74c3c; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* 鎖定盤面 */
        .locked { pointer-events: none; }

        /* 主題特效層 */
        #theme-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
    </style>
</head>
<body>

    <div id="theme-layer"></div>

    <div class="game-header">
        <button class="back-btn" onclick="goBack()">⭠ 返回大廳</button>
        <div class="status-board">
            <div>當前回合: <span id="current-turn" class="active-team-red">紅隊</span></div>
            <div style="margin-left: 30px;">⏱️ <span id="timer">60</span>s</div>
        </div>
    </div>

    <div id="unscramble-container">
        <!-- 題目提示 -->
        <div id="question-hint">載入中...</div>
        
        <!-- 學生作答區 -->
        <div id="answer-area"></div>
        
        <!-- 打亂的字母庫 -->
        <div id="source-area"></div>

        <!-- 操作按鈕 -->
        <div class="controls">
            <button class="action-btn btn-undo" onclick="undoLast()">↩ 退回一格</button>
            <button class="action-btn btn-clear" onclick="clearAll()">✖ 全部重來</button>
        </div>
    </div>
    
    <script src="../js/progress.js"></script>
    <script src="../js/eventManager.js"></script>
    <script>
        // ================= 1. 資料初始化 =================
        let vocabData = JSON.parse(sessionStorage.getItem('itip_current_vocab')) || [];
        const selectedTheme = sessionStorage.getItem('itip_theme') || 'None';
        
        let currentTurn = 'red'; 
        let targetWord = ""; // 當前正確單字
        let isLocked = false;

        const answerArea = document.getElementById('answer-area');
        const sourceArea = document.getElementById('source-area');

        // ================= 2. 核心遊戲邏輯 =================

        // 洗牌工具
        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // 載入下一題
        function loadNextQuestion() {
            if (vocabData.length === 0) return;

            // 隨機抽一題
            const targetItem = vocabData[Math.floor(Math.random() * vocabData.length)];
            targetWord = targetItem.english.trim(); // 確保沒有前後空白
            
            // 顯示提示 (預設顯示中文，也可擴充圖片 img 標籤)
            document.getElementById('question-hint').innerText = `【 ${targetItem.chinese} 】`;

            // 將單字拆解成字母陣列並打亂
            let lettersArray = targetWord.split('');
            let scrambledLetters = shuffleArray(lettersArray);
            
            // 防呆：如果打亂後跟原單字一樣，就再打亂一次
            while(scrambledLetters.join('') === targetWord && targetWord.length > 1) {
                scrambledLetters = shuffleArray(lettersArray);
            }

            // 清空畫面與解鎖
            answerArea.innerHTML = '';
            answerArea.className = '';
            sourceArea.innerHTML = '';
            isLocked = false;
            document.body.classList.remove('locked');

            // 渲染字母方塊
            scrambledLetters.forEach((letter, index) => {
                const chip = document.createElement('div');
                chip.className = 'letter-chip';
                chip.innerText = letter;
                chip.dataset.id = `chip-${index}`; // 給予唯一 ID 方便退回時辨識
                
                chip.onclick = () => moveChipToAnswer(chip);
                sourceArea.appendChild(chip);
            });
        }

        // 將字母移動到作答區
        function moveChipToAnswer(chip) {
            if (isLocked) return;
            playSound('click');
            
            // 從來源區移除，加入作答區
            sourceArea.removeChild(chip);
            
            // 改變點擊行為：在作答區點擊可以退回
            chip.onclick = () => moveChipToSource(chip);
            answerArea.appendChild(chip);

            // 自動檢查是否已經排滿
            checkAnswer();
        }

        // 將字母退回來源區
        function moveChipToSource(chip) {
            if (isLocked) return;
            playSound('click');
            
            answerArea.removeChild(chip);
            
            // 恢復點擊行為
            chip.onclick = () => moveChipToAnswer(chip);
            sourceArea.appendChild(chip);
        }

        // 輔助按鈕：退回最後一個字母
        function undoLast() {
            if (isLocked || answerArea.children.length === 0) return;
            const lastChip = answerArea.lastElementChild;
            moveChipToSource(lastChip);
        }

        // 輔助按鈕：全部清空重排
        function clearAll() {
            if (isLocked || answerArea.children.length === 0) return;
            // 反向迴圈把所有作答區的字母退回
            const chips = Array.from(answerArea.children);
            chips.forEach(chip => moveChipToSource(chip));
        }

        // 檢查答案
        function checkAnswer() {
            // 取出作答區目前的字母組成字串
            const currentString = Array.from(answerArea.children).map(chip => chip.innerText).join('');
            
            // 如果還沒排滿，就不檢查 (忽略大小寫對比)
            if (currentString.length !== targetWord.length) return;

            isLocked = true;
            document.body.classList.add('locked');

            if (currentString.toLowerCase() === targetWord.toLowerCase()) {
                // 答對邏輯
                answerArea.classList.add('correct');
                playSound('correct');
                dispatchGameEvent('CORRECT_ANSWER', currentTurn);

                setTimeout(() => {
                    switchTurn();
                    loadNextQuestion();
                }, 1500);

            } else {
                // 答錯邏輯：給予錯誤震動提示，然後自動清空重來
                answerArea.classList.add('wrong');
                playSound('wrong');
                dispatchGameEvent('WRONG_ANSWER', currentTurn);

                setTimeout(() => {
                    answerArea.classList.remove('wrong');
                    clearAll();
                    isLocked = false;
                    document.body.classList.remove('locked');
                }, 800);
            }
        }

        // 切換回合
        function switchTurn() {
            currentTurn = (currentTurn === 'red') ? 'blue' : 'red';
            const turnDisplay = document.getElementById('current-turn');
            turnDisplay.innerText = (currentTurn === 'red') ? '紅隊' : '藍隊';
            turnDisplay.className = `active-team-${currentTurn}`;
        }

        // ================= 3. 系統通訊 (Event Emitter) =================
        function dispatchGameEvent(eventType, team) {
            const event = new CustomEvent('ITIP_GAME_EVENT', {
                detail: { type: eventType, team: team, coreGame: 'Unscramble' }
            });
            document.dispatchEvent(event);
        }

        // ================= 4. 工具 =================
        function playSound(type) {
            try {
                let url = '';
                if (type === 'click') url = 'https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3'; // 清脆的敲擊聲
                else if (type === 'correct') url = 'https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3';
                else if (type === 'wrong') url = 'https://assets.mixkit.co/active_storage/sfx/2572/2572-preview.mp3';
                if(url) new Audio(url).play();
            } catch (e) {}
        }

        function goBack() { window.location.href = '../index.html?return=games'; }

        // 啟動遊戲
        window.onload = () => {
            loadNextQuestion();
        };

    </script>
</body>
</html>
