<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Engine - ITIP 2.0</title>
    <style>
        /* ================= 核心測驗引擎基礎樣式 ================= */
        :root {
            --bg-color: #f4f7f6;
            --text-color: #2c3e50;
            --card-front: #4facfe; /* 卡背的顏色 (遊戲中朝上的那一面) */
            --card-back: #ffffff;  /* 內容面的顏色 (翻開來的那一面) */
            --border-color: #cbd5e1;
        }

        body { 
            margin: 0; height: 100vh; font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-color); display: flex; flex-direction: column;
            overflow: hidden; user-select: none;
        }

        /* 頂部資訊列 */
        .game-header { 
            background: rgba(255, 255, 255, 0.95); padding: 15px 30px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; 
            justify-content: space-between; align-items: center; z-index: 100;
        }
        .back-btn { padding: 8px 16px; border: 1px solid #ccc; border-radius: 20px; background: white; cursor: pointer; font-weight: bold; }
        .status-board { display: flex; gap: 20px; font-size: 20px; font-weight: bold; }
        .active-team-red { color: #E21B3C; }
        .active-team-blue { color: #1cb0f6; }

        /* 遊戲區域 */
        #game-arena {
            flex-grow: 1; display: flex; justify-content: center; align-items: center;
            padding: 20px; z-index: 10;
        }

        /* 網格佈局 */
        #memory-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px;
            max-width: 800px; width: 100%;
        }

        /* ================= 記憶卡片 3D 翻轉樣式 ================= */
        .memory-card {
            width: 100%;
            aspect-ratio: 3/4; /* 撲克牌比例 */
            perspective: 1000px; /* 創造 3D 空間感 */
            cursor: pointer;
        }

        .memory-inner {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d; /* 讓子元素保留 3D 位置 */
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-radius: 12px;
        }

        /* 翻牌動作 */
        .memory-card.flip .memory-inner {
            transform: rotateY(180deg);
        }

        /* 卡片的正反面共用設定 */
        .memory-front, .memory-back {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            backface-visibility: hidden; /* 翻到背面時隱藏 */
            border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            font-size: clamp(20px, 4vw, 32px); font-weight: bold; text-align: center;
            padding: 10px; box-sizing: border-box; word-break: break-word;
        }

        /* 卡面蓋上的狀態 (視覺上的 Front) */
        .memory-front {
            background: linear-gradient(135deg, var(--card-front), #00f2fe);
            color: white; font-size: 40px;
        }

        /* 卡面翻開的狀態 (包含單字內容) */
        .memory-back {
            background: var(--card-back);
            color: var(--text-color);
            border: 3px solid var(--card-front);
            transform: rotateY(180deg); /* 預設先翻轉 180 度藏在後面 */
        }

        /* 配對成功的卡片視覺 */
        .memory-card.matched .memory-inner {
            box-shadow: 0 0 15px #26890C;
            opacity: 0.7;
        }

        /* 鎖定盤面 */
        .locked { pointer-events: none; }

        /* 主題特效層 */
        #theme-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
    </style>
</head>
<body>

    <div id="theme-layer"></div>

    <div class="game-header">
        <button class="back-btn" onclick="goBack()">⭠ 返回大廳</button>
        <div class="status-board">
            <div>當前回合: <span id="current-turn" class="active-team-red">紅隊</span></div>
            <div style="margin-left: 30px;">⏱️ <span id="timer">60</span>s</div>
        </div>
    </div>

    <div id="game-arena">
        <div id="memory-grid">
            <!-- 卡片由 JS 動態生成 -->
        </div>
    </div>

    <script src="../js/eventManager.js"></script>
    <script>
        // ================= 1. 資料初始化 =================
        let vocabData = JSON.parse(sessionStorage.getItem('itip_current_vocab')) || [];
        const selectedTheme = sessionStorage.getItem('itip_theme') || 'None';
        const GRID_SIZE = 12; // 預設 12 張牌 (6對)
        
        // 確保題目足夠，如果不足則複製
        while (vocabData.length < GRID_SIZE / 2) { vocabData = vocabData.concat([...vocabData]); }

        let currentTurn = 'red'; 
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let matchedPairs = 0;

        // ================= 2. 核心遊戲邏輯 =================
        const grid = document.getElementById('memory-grid');

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initBoard() {
            grid.innerHTML = '';
            let selectedPairs = shuffleArray([...vocabData]).slice(0, GRID_SIZE / 2);
            let cardsToRender = [];

            // 產生配對資料 (英、中對應)
            selectedPairs.forEach(item => {
                cardsToRender.push({ pairId: item.english, text: item.english });
                cardsToRender.push({ pairId: item.english, text: item.chinese });
            });

            cardsToRender = shuffleArray(cardsToRender);

            // 渲染 DOM
            cardsToRender.forEach(cardData => {
                const cardEl = document.createElement('div');
                cardEl.className = 'memory-card';
                cardEl.dataset.pair = cardData.pairId;
                
                // HTML 結構：外層 perspective -> 內層 preserve-3d -> 絕對定位的正反面
                cardEl.innerHTML = `
                    <div class="memory-inner">
                        <div class="memory-front">?</div>
                        <div class="memory-back">${cardData.text}</div>
                    </div>
                `;
                
                cardEl.addEventListener('click', () => flipCard(cardEl));
                grid.appendChild(cardEl);
            });
        }

        function flipCard(card) {
            // 盤面鎖定、點到已配對的、或是點到同一張牌時，不執行動作
            if (lockBoard || card.classList.contains('matched') || card === firstCard) return;

            card.classList.add('flip');

            // 這是翻開的第一張牌
            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = card;
                return;
            }

            // 這是翻開的第二張牌，準備判定
            secondCard = card;
            checkMatch();
        }

        function checkMatch() {
            let isMatch = firstCard.dataset.pair === secondCard.dataset.pair;
            
            // 判定期間立刻鎖定盤面
            lockBoard = true;

            if (isMatch) {
                // 配對成功
                playSound('correct');
                firstCard.classList.add('matched');
                secondCard.classList.add('matched');
                matchedPairs++;

                dispatchGameEvent('CORRECT_ANSWER', currentTurn);

                // 檢查是否過關
                if (matchedPairs === GRID_SIZE / 2) {
                    setTimeout(() => alert("過關！"), 500); // 之後可替換為結算畫面
                }
                
                resetBoard();
            } else {
                // 配對失敗，延遲蓋回
                playSound('wrong');
                dispatchGameEvent('WRONG_ANSWER', currentTurn);

                setTimeout(() => {
                    firstCard.classList.remove('flip');
                    secondCard.classList.remove('flip');
                    resetBoard();
                }, 1200); // 讓學生有 1.2 秒的時間記憶翻開的牌
            }
        }

        function resetBoard() {
            // 切換回合
            currentTurn = (currentTurn === 'red') ? 'blue' : 'red';
            const turnDisplay = document.getElementById('current-turn');
            turnDisplay.innerText = (currentTurn === 'red') ? '紅隊' : '藍隊';
            turnDisplay.className = `active-team-${currentTurn}`;

            // 重置狀態
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        // ================= 3. 系統通訊 (Event Emitter) =================
        function dispatchGameEvent(eventType, team) {
            const event = new CustomEvent('ITIP_GAME_EVENT', {
                detail: { type: eventType, team: team, coreGame: 'Memory' }
            });
            document.dispatchEvent(event);
            console.log(`📡 發送事件: ${eventType} | 隊伍: ${team}`);
        }

        // ================= 4. 工具 =================
        function playSound(type) {
            try {
                const url = type === 'correct' 
                    ? 'https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3' 
                    : 'https://assets.mixkit.co/active_storage/sfx/2572/2572-preview.mp3';
                new Audio(url).play();
            } catch (e) {}
        }

        function goBack() { window.location.href = '../index.html?return=games'; }

        // 啟動遊戲
        window.onload = () => {
            initBoard();
        };

    </script>
</body>
</html>
