<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matching Dual - ITIP 2.0</title>
    <style>
        /* ================= 核心測驗引擎基礎樣式 ================= */
        :root {
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --border-color: #cbd5e1;
            --correct-color: #26890C;
            --wrong-color: #E21B3C;
        }

        body { 
            margin: 0; height: 100vh; font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-color); display: flex; flex-direction: column;
            overflow: hidden; user-select: none; 
            touch-action: none; /* 禁用瀏覽器預設的雙擊縮放，確保觸控極度流暢 */
        }

        /* 頂部資訊列 */
        .game-header { 
            background: rgba(255, 255, 255, 0.95); padding: 10px 30px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; 
            justify-content: space-between; align-items: center; z-index: 100;
        }
        .back-btn { padding: 8px 16px; border: 1px solid #ccc; border-radius: 20px; background: white; cursor: pointer; font-weight: bold; }
        
        /* 左右分屏競技場 */
        #dual-arena {
            flex-grow: 1; display: flex; width: 100%; position: relative; z-index: 10;
        }

        /* 隊伍專屬區域 */
        .team-side {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            padding: 20px; position: relative;
        }
        .red-side { background-color: rgba(226, 27, 60, 0.05); border-right: 4px dashed #bdc3c7; }
        .blue-side { background-color: rgba(28, 176, 246, 0.05); }

        .team-title { font-size: 28px; font-weight: 900; margin-bottom: 15px; }
        .red-side .team-title { color: #E21B3C; }
        .blue-side .team-title { color: #1cb0f6; }

        /* 卡片網格 (每邊 12 張) */
        .matching-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;
            width: 100%; max-width: 500px;
        }

        /* 卡片樣式 */
        .match-card {
            aspect-ratio: 4/3; background-color: var(--card-bg);
            border: 3px solid var(--border-color); border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            font-size: clamp(16px, 2.5vw, 24px); font-weight: bold; color: #2c3e50;
            cursor: pointer; box-shadow: 0 6px 0 var(--border-color);
            transition: transform 0.1s, box-shadow 0.1s, opacity 0.3s;
            text-align: center; padding: 10px; word-break: break-word;
        }
        .match-card:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--border-color); }

        /* 狀態樣式 */
        .selected-red { border-color: #E21B3C; background: #ffebef; box-shadow: 0 6px 0 #E21B3C; transform: scale(1.05); }
        .selected-blue { border-color: #1cb0f6; background: #ddf4ff; box-shadow: 0 6px 0 #1cb0f6; transform: scale(1.05); }
        
        .matched { opacity: 0; transform: scale(0.5); pointer-events: none; }
        .wrong { animation: shake 0.4s; background: #ffebee; border-color: var(--wrong-color); }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .locked { pointer-events: none; }

        /* 主題特效層 */
        #theme-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
    </style>
</head>
<body>

    <div id="theme-layer"></div>

    <div class="game-header">
        <button class="back-btn" onclick="goBack()">⭠ 返回大廳</button>
        <div style="font-size: 24px; font-weight: 900; color: #333;">⚔️ 雙打配對戰 ⚔️</div>
    </div>

    <div id="dual-arena">
        <!-- 紅隊區域 -->
        <div class="team-side red-side">
            <div class="team-title">紅隊 (Red)</div>
            <div class="matching-grid" id="grid-red"></div>
        </div>
        
        <!-- 藍隊區域 -->
        <div class="team-side blue-side">
            <div class="team-title">藍隊 (Blue)</div>
            <div class="matching-grid" id="grid-blue"></div>
        </div>
    </div>

    <!-- 系統通訊架構 (需確認這些檔案存在) -->
    <script src="../js/progress.js"></script>
    <script src="../js/eventManager.js"></script>

    <script>
        // ================= 1. 資料初始化 =================
        let vocabData = JSON.parse(sessionStorage.getItem('itip_current_vocab')) || [];
        const GRID_SIZE = 12; // 每一邊各有 12 張牌
        
        while (vocabData.length < 6) { vocabData = vocabData.concat([...vocabData]); }

        // 【關鍵】兩隊擁有完全獨立的狀態記憶體
        let gameState = {
            red: { selectedCards: [], isLocked: false, grid: document.getElementById('grid-red') },
            blue: { selectedCards: [], isLocked: false, grid: document.getElementById('grid-blue') }
        };

        // ================= 2. 雙打核心邏輯 =================
        function shuffleArray(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // 分別初始化兩邊的盤面
        function initDualBoard() {
            initTeamBoard('red');
            initTeamBoard('blue');
        }

        function initTeamBoard(team) {
            const teamState = gameState[team];
            teamState.grid.innerHTML = '';
            
            // 兩隊抽取的題目打亂順序不同，保證各憑本事
            let initialPairs = shuffleArray(vocabData).slice(0, GRID_SIZE / 2);
            let cardsToRender = [];

            initialPairs.forEach(item => {
                cardsToRender.push({ id: item.english, text: item.english });
                cardsToRender.push({ id: item.english, text: item.chinese });
            });

            cardsToRender = shuffleArray(cardsToRender);

            cardsToRender.forEach((card, index) => {
                teamState.grid.appendChild(createCardElement(card.id, card.text, index, team));
            });
        }

        function createCardElement(pairId, content, slotIndex, team) {
            const card = document.createElement('div');
            card.className = 'match-card';
            card.dataset.pair = pairId;   
            card.dataset.slot = slotIndex; 
            card.dataset.team = team; // 標記這張牌屬於哪一隊
            card.innerHTML = content;
            
            // 使用 pointerdown 支援多點觸控，徹底解決滑鼠 click 單點限制
            card.addEventListener('pointerdown', () => handleCardClick(card, team));
            return card;
        }

        function handleCardClick(card, team) {
            const teamState = gameState[team];

            if (teamState.isLocked || card.classList.contains('matched') || teamState.selectedCards.includes(card)) return;

            card.classList.add(`selected-${team}`);
            teamState.selectedCards.push(card);

            if (teamState.selectedCards.length === 2) {
                teamState.isLocked = true;
                checkMatch(team);
            }
        }

        function checkMatch(team) {
            const teamState = gameState[team];
            const card1 = teamState.selectedCards[0];
            const card2 = teamState.selectedCards[1];
            const isMatch = (card1.dataset.pair === card2.dataset.pair);

            if (isMatch) {
                playSound('correct');
                card1.classList.add('matched');
                card2.classList.add('matched');

                // 發送廣播 (ProgressTracker 會自動幫這隊加分)
                dispatchGameEvent('CORRECT_ANSWER', team);

                setTimeout(() => {
                    replenishCards(card1, card2, team);
                    teamState.selectedCards = [];
                    teamState.isLocked = false;
                }, 400); 

            } else {
                playSound('wrong');
                card1.classList.add('wrong');
                card2.classList.add('wrong');
                
                dispatchGameEvent('WRONG_ANSWER', team);

                setTimeout(() => {
                    card1.classList.remove('wrong', `selected-${team}`);
                    card2.classList.remove('wrong', `selected-${team}`);
                    teamState.selectedCards = [];
                    teamState.isLocked = false;
                }, 500);
            }
        }

        function replenishCards(card1, card2, team) {
            const teamState = gameState[team];
            const newItem = vocabData[Math.floor(Math.random() * vocabData.length)];
            
            let newCards = [
                { id: newItem.english, text: newItem.english },
                { id: newItem.english, text: newItem.chinese }
            ];
            newCards = shuffleArray(newCards);

            teamState.grid.replaceChild(createCardElement(newCards[0].id, newCards[0].text, card1.dataset.slot, team), card1);
            teamState.grid.replaceChild(createCardElement(newCards[1].id, newCards[1].text, card2.dataset.slot, team), card2);
        }

        // ================= 3. 系統通訊 =================
        function dispatchGameEvent(eventType, team) {
            const event = new CustomEvent('ITIP_GAME_EVENT', {
                detail: { type: eventType, team: team, coreGame: 'MatchingDual' }
            });
            document.dispatchEvent(event);
        }

        function playSound(type) {
            try {
                const url = type === 'correct' 
                    ? 'https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3' 
                    : 'https://assets.mixkit.co/active_storage/sfx/2572/2572-preview.mp3';
                new Audio(url).play();
            } catch (e) {}
        }

        function goBack() { window.location.href = '../index.html?return=games'; }

        window.onload = () => {
            initDualBoard();
        };

    </script>
</body>
</html>
