<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Dual - ITIP 2.0</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --red-color: #E21B3C;
            --blue-color: #1cb0f6;
        }

        body { 
            margin: 0; height: 100vh; font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-color); display: flex; flex-direction: column;
            overflow: hidden; user-select: none; touch-action: none;
        }

        /* 頂部資訊列 */
        .game-header { 
            background: white; padding: 10px 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        
        /* 競技場主要區域 */
        #arena {
            flex-grow: 1; display: flex; flex-direction: column; position: relative; z-index: 10;
        }

        /* 題目顯示區 (共用中央) */
        #question-zone {
            height: 35%; display: flex; justify-content: center; align-items: center;
            font-size: 80px; font-weight: 900; color: #333; flex-direction: column;
            background: rgba(255,255,255,0.5); box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        
        /* 圖片題目專用 */
        #question-image { max-height: 80%; border-radius: 20px; display: none; }
        /* 語音題目專用 */
        #play-audio-btn { 
            font-size: 50px; padding: 20px 40px; border-radius: 50px; 
            background: #ffd32a; border: none; cursor: pointer; display: none;
            box-shadow: 0 8px 0 #d1a812;
        }

        /* 左右按鈕區 */
        #action-zone { flex-grow: 1; display: flex; width: 100%; }

        .team-side {
            flex: 1; display: flex; flex-wrap: wrap; justify-content: center; align-items: center;
            padding: 20px; gap: 15px; position: relative;
        }
        .red-side { background-color: rgba(226, 27, 60, 0.05); border-right: 4px dashed #bdc3c7; }
        .blue-side { background-color: rgba(28, 176, 246, 0.05); }

        /* 選項按鈕 */
        .option-btn {
            width: 45%; height: 40%; font-size: 36px; font-weight: bold;
            border-radius: 20px; border: 4px solid transparent; background: white;
            box-shadow: 0 8px 0 #ccc; display: flex; justify-content: center; align-items: center;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .option-btn:active { transform: translateY(8px); box-shadow: 0 0 0 transparent; }
        
        .red-side .option-btn { color: var(--red-color); border-color: #ffb8c6; }
        .blue-side .option-btn { color: var(--blue-color); border-color: #b8e6ff; }

        /* 換人遮罩 (換題時出現) */
        #switch-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 999;
            display: none; justify-content: center; align-items: center; flex-direction: column;
            color: white; font-size: 80px; font-weight: 900;
        }
        #switch-text { font-size: 120px; color: #ffd32a; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="game-header">
        <button onclick="window.history.back()" style="padding: 10px; font-size:18px;">返回</button>
        <div style="font-size: 24px; font-weight: 900;">🔥 四選一：雙打搶答 🔥</div>
    </div>

    <div id="arena">
        <!-- 題目區 -->
        <div id="question-zone">
            <span id="question-text"></span>
            <img id="question-image" src="" alt="題目圖片">
            <button id="play-audio-btn">🔊 點擊播放</button>
        </div>

        <!-- 按鈕區 -->
        <div id="action-zone">
            <div class="team-side red-side" id="red-buttons"></div>
            <div class="team-side blue-side" id="blue-buttons"></div>
        </div>
    </div>

    <!-- 換人倒數遮罩 -->
    <div id="switch-overlay">
        <div>換下一組！</div>
        <div id="switch-text">3</div>
    </div>

    <!-- 系統通訊架構 -->
    <script src="../js/progress.js"></script>
    <script src="../js/eventManager.js"></script>

    <script>
        // ================= 1. 遊戲狀態與資料 =================
        // 從 sessionStorage 讀取 API 準備好的單字
        let vocabData = JSON.parse(sessionStorage.getItem('itip_current_vocab')) || [];
        
        // 模擬大廳傳來的設定 (未來由大廳設定寫入)
        // mode: 'text'(英翻中) | 'image'(看圖選字) | 'audio'(聽音辨字)
        let gameConfig = JSON.parse(sessionStorage.getItem('itip_config')) || { mode: 'image' }; 
        
        let currentQuestion = null;
        let isLocked = false; // 用來防止學生無腦狂按

        // ================= 2. 遊戲初始化 =================
        function initGame() {
            if(vocabData.length === 0) {
                alert("沒有讀取到單字資料！");
                return;
            }
            loadNextQuestion();
        }

        // ================= 3. 核心出題邏輯 =================
        function loadNextQuestion() {
            isLocked = false;
            
            // 隨機抽一題
            currentQuestion = vocabData[Math.floor(Math.random() * vocabData.length)];
            
            // 準備四個選項 (1正確 + 3干擾)
            let options = [currentQuestion];
            let tempVocab = [...vocabData].filter(v => v.english !== currentQuestion.english);
            
            while(options.length < 4 && tempVocab.length > 0) {
                let randomIndex = Math.floor(Math.random() * tempVocab.length);
                options.push(tempVocab.splice(randomIndex, 1)[0]);
            }
            // 打亂選項順序
            options.sort(() => Math.random() - 0.5);

            renderQuestion();
            renderButtons(options);
        }

        function renderQuestion() {
            const qText = document.getElementById('question-text');
            const qImage = document.getElementById('question-image');
            const qAudioBtn = document.getElementById('play-audio-btn');

            qText.style.display = 'none';
            qImage.style.display = 'none';
            qAudioBtn.style.display = 'none';

            // 根據 ESL 三模式動態切換顯示
            if (gameConfig.mode === 'text') {
                qText.innerText = currentQuestion.english;
                qText.style.display = 'block';
            } else if (gameConfig.mode === 'image') {
                qImage.src = currentQuestion.image_URL; // 抓取 Google Sheets 的圖片網址
                qImage.style.display = 'block';
            } else if (gameConfig.mode === 'audio') {
                qAudioBtn.style.display = 'block';
                qAudioBtn.onclick = () => { new Audio(currentQuestion.audio_URL).play(); };
            }
        }

        function renderButtons(options) {
            const redZone = document.getElementById('red-buttons');
            const blueZone = document.getElementById('blue-buttons');
            redZone.innerHTML = ''; blueZone.innerHTML = '';

            // 給紅藍兩隊各自產生 4 個按鈕
            options.forEach(opt => {
                redZone.appendChild(createBtn(opt, 'red'));
                blueZone.appendChild(createBtn(opt, 'blue'));
            });
        }

        function createBtn(optionData, team) {
            const btn = document.createElement('div');
            btn.className = 'option-btn';
            
            // 如果題目是考圖片或語音，按鈕上就顯示英文；如果題目是考英文，按鈕就顯示中文
            btn.innerText = (gameConfig.mode === 'text') ? optionData.chinese : optionData.english;
            
            // ★ 多點觸控專用事件 ★
            btn.addEventListener('pointerdown', () => checkAnswer(optionData, team));
            return btn;
        }

        // ================= 4. 判定與換人邏輯 =================
        function checkAnswer(selectedOption, team) {
            if (isLocked) return;
            isLocked = true; // 有人按了，立刻鎖定畫面

            const isCorrect = (selectedOption.english === currentQuestion.english);
            
            if (isCorrect) {
                // 答對，直接得分
                dispatchGameEvent('CORRECT_ANSWER', team);
            } else {
                // 一翻兩瞪眼：答錯直接把分數送給對手！
                const opponent = (team === 'red') ? 'blue' : 'red';
                dispatchGameEvent('CORRECT_ANSWER', opponent); // 對手加分
                dispatchGameEvent('WRONG_ANSWER', team);       // 自己播失誤音效
            }

            // 啟動強制換人倒數
            triggerSwitchTurn();
        }

        function triggerSwitchTurn() {
            const overlay = document.getElementById('switch-overlay');
            const countText = document.getElementById('switch-text');
            overlay.style.display = 'flex';
            
            let count = 3;
            countText.innerText = count;

            const timer = setInterval(() => {
                count--;
                if (count > 0) {
                    countText.innerText = count;
                } else {
                    clearInterval(timer);
                    overlay.style.display = 'none';
                    loadNextQuestion(); // 換下一題
                }
            }, 1000);
        }

        function dispatchGameEvent(eventType, team) {
            const event = new CustomEvent('ITIP_GAME_EVENT', {
                detail: { type: eventType, team: team }
            });
            document.dispatchEvent(event);
        }

        window.onload = initGame;
    </script>
</body>
</html>
