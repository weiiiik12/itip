<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Battle - ITIP 2.0</title>
    <style>
        :root {
            --red-team: #E21B3C;
            --blue-team: #1cb0f6;
            --bg-color: #f8fafc;
        }

        body {
            margin: 0; height: 100vh; font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color); display: flex; flex-direction: column;
            overflow: hidden; user-select: none; touch-action: none; /* 禁用雙擊縮放 */
        }

        /* 頂部導覽列與模式控制 */
        .game-header {
            background: white; padding: 10px 20px; display: flex;
            justify-content: space-between; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); z-index: 100;
        }
        .back-btn { padding: 10px 20px; border: 1px solid #cbd5e1; border-radius: 20px; background: white; cursor: pointer; font-weight: bold; font-size: 16px; }

        /* 模式切換按鈕區 */
        .mode-controls {
            display: flex; gap: 8px; background: #f1f5f9; padding: 6px; border-radius: 12px;
        }
        .mode-btn {
            padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer;
            background: transparent; font-weight: bold; color: #64748b; font-size: 18px;
            transition: 0.2s;
        }
        .mode-btn.active { background: #3b82f6; color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* 中央題目顯示區 (修正遮擋，改回標準區塊) */
        .question-container {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 15px; min-height: 120px; background: white;
            border-bottom: 2px solid #e2e8f0; z-index: 90;
        }
        .q-text { font-size: clamp(32px, 4vw, 56px); font-weight: 900; color: #1e293b; margin: 0; text-align: center; }
        .q-img { max-height: 180px; border-radius: 12px; object-fit: contain; }

        /* 語音播放按鈕 */
        .audio-btn {
            background: #4f46e5; color: white; border: none; padding: 15px 30px;
            border-radius: 30px; font-weight: bold; font-size: 24px; cursor: pointer;
            display: inline-flex; align-items: center; gap: 10px; box-shadow: 0 6px 0 #3730a3;
        }
        .audio-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #3730a3; }

        /* 競技場主體：滿屏左右分隊 */
        .battle-arena {
            flex-grow: 1; display: flex; width: 100%;
        }

        .team-panel {
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            padding: 20px; position: relative;
        }
        .team-panel.red { background-color: rgba(226, 27, 60, 0.05); border-right: 4px dashed #cbd5e1; }
        .team-panel.blue { background-color: rgba(28, 176, 246, 0.05); }

        .team-name { font-size: clamp(24px, 3vw, 36px); font-weight: 900; margin-bottom: 15px; }
        .team-panel.red .team-name { color: var(--red-team); }
        .team-panel.blue .team-name { color: var(--blue-team); }

        /* 滿屏超大按鈕網格 */
        .options-grid {
            display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; 
            gap: 20px; width: 100%; max-width: 900px; flex-grow: 1; margin-bottom: 10px;
        }
        .option-btn {
            background: white; border: 4px solid #cbd5e1; border-radius: 24px;
            font-size: clamp(32px, 5vw, 64px); font-weight: 900; color: #334155;
            cursor: pointer; box-shadow: 0 8px 0 #cbd5e1; transition: 0.1s;
            display: flex; justify-content: center; align-items: center; text-align: center;
            word-break: break-word; padding: 10px;
        }
        .option-btn:active { transform: translateY(6px); box-shadow: 0 2px 0 #cbd5e1; }

        /* 答對/答錯視覺回饋 */
        .option-btn.correct { background: #22c55e !important; color: white !important; border-color: #15803d !important; box-shadow: 0 8px 0 #15803d !important; }
        .option-btn.wrong { background: #ef4444 !important; color: white !important; border-color: #b91c1c !important; box-shadow: 0 8px 0 #b91c1c !important; }
        
        .locked { pointer-events: none; filter: grayscale(50%); opacity: 0.8; }

        #theme-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; }
    </style>
</head>
<body>

    <div id="theme-layer"></div>

    <!-- 頂部導覽列與模式選擇 -->
    <div class="game-header">
        <button class="back-btn" onclick="goBack()">⭠ 返回大廳</button>
        
        <!-- ESL 多感官輸入模式切換 -->
        <div class="mode-controls">
            <button class="mode-btn active" id="btn-mode-chinese" onclick="setMode('chinese')">中文 ➔ 英</button>
            <button class="mode-btn" id="btn-mode-english" onclick="setMode('english')">英文 ➔ 中</button>
            <button class="mode-btn" id="btn-mode-image" onclick="setMode('image')">圖片 ➔ 英</button>
            <button class="mode-btn" id="btn-mode-audio" onclick="setMode('audio')">語音 ➔ 英</button>
        </div>

        <div id="score-board" style="font-weight: bold; font-size: 22px;">紅隊 0 : 0 藍隊</div>
    </div>

    <!-- 中央共用題目區 -->
    <div class="question-container">
        <div class="q-text" id="question-text"></div>
        <div id="media-container"></div>
    </div>

    <!-- 對戰主舞台 -->
    <div class="battle-arena">
        <div class="team-panel red" id="panel-red">
            <div class="team-name">🔴 紅隊</div>
            <div class="options-grid" id="options-red"></div>
        </div>
        <div class="team-panel blue" id="panel-blue">
            <div class="team-name">🔵 藍隊</div>
            <div class="options-grid" id="options-blue"></div>
        </div>
    </div>

    <script src="../js/progress.js"></script>
    <script src="../js/eventManager.js"></script>

    <script>
        // 1. 取得題庫 (模擬測試資料，請確保您的表單資料包含 image 與 audio 連結)
        let vocabData = JSON.parse(sessionStorage.getItem('itip_current_vocab')) || [
            { english: "Apple", chinese: "蘋果", image: "https://cdn-icons-png.flaticon.com/512/415/415733.png", audio: "https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3" },
            { english: "Banana", chinese: "香蕉", image: "https://cdn-icons-png.flaticon.com/512/2909/2909761.png", audio: "" },
            { english: "Cat", chinese: "貓", image: "", audio: "" },
            { english: "Dog", chinese: "狗", image: "", audio: "" },
            { english: "Elephant", chinese: "大象", image: "", audio: "" }
        ];

        let currentMode = 'chinese'; // 預設模式

        function setMode(mode) {
            currentMode = mode;
            // 更新按鈕樣式
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-mode-' + mode).classList.add('active');
            
            loadNewQuestion();
        }

        function loadNewQuestion() {
            if (vocabData.length === 0) return;
            
            const currentItem = vocabData[Math.floor(Math.random() * vocabData.length)];
            
            let qText = '';
            let mediaHtml = '';
            let correctAnswer = ''; 
            let optionsTextType = 'english'; // 按鈕預設顯示英文

            // 依據老師選擇的模式，設定題目與選項內容
            switch (currentMode) {
                case 'chinese':
                    qText = currentItem.chinese;
                    correctAnswer = currentItem.english;
                    optionsTextType = 'english';
                    break;
                case 'english':
                    qText = currentItem.english;
                    correctAnswer = currentItem.chinese;
                    optionsTextType = 'chinese';
                    break;
                case 'image':
                    if (currentItem.image) {
                        mediaHtml = `<img src="${currentItem.image}" class="q-img">`;
                    } else {
                        qText = `[圖片遺失] ${currentItem.chinese}`;
                    }
                    correctAnswer = currentItem.english;
                    optionsTextType = 'english';
                    break;
                case 'audio':
                    if (currentItem.audio) {
                        mediaHtml = `<button class="audio-btn" onclick="playAudio('${currentItem.audio}')">🔊 播放發音</button>`;
                        playAudio(currentItem.audio); // 自動播放一次
                    } else {
                        qText = `[音檔遺失] ${currentItem.chinese}`;
                    }
                    correctAnswer = currentItem.english;
                    optionsTextType = 'english';
                    break;
            }

            // 更新畫面
            document.getElementById('question-text').innerText = qText;
            document.getElementById('question-text').style.display = qText ? 'block' : 'none';
            document.getElementById('media-container').innerHTML = mediaHtml;

            // 產生隨機選項
            let options = generateOptions(currentItem, optionsTextType);

            // 渲染雙方按鈕
            renderTeamOptions('red', options, correctAnswer);
            renderTeamOptions('blue', options, correctAnswer);

            // 解除鎖定
            document.getElementById('panel-red').classList.remove('locked');
            document.getElementById('panel-blue').classList.remove('locked');
        }

        function generateOptions(correctItem, type) {
            let options = [correctItem[type]];
            let attempts = 0;
            while (options.length < 4 && attempts < 50) {
                attempts++;
                let randomItem = vocabData[Math.floor(Math.random() * vocabData.length)];
                let opt = randomItem[type];
                if (opt && !options.includes(opt)) {
                    options.push(opt);
                }
            }
            return options.sort(() => Math.random() - 0.5);
        }

        function renderTeamOptions(team, options, correctAnswer) {
            const grid = document.getElementById(`options-${team}`);
            grid.innerHTML = '';

            options.forEach(optText => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = optText;
                
                // 【重點防呆】使用 pointerdown 支援多點觸控，避免滑鼠單點限制
                btn.addEventListener('pointerdown', () => handleAnswer(btn, optText, correctAnswer, team));
                grid.appendChild(btn);
            });
        }

        function handleAnswer(btn, selectedText, correctAnswer, team) {
            const panel = document.getElementById(`panel-${team}`);
            
            if (panel.classList.contains('locked')) return;
            panel.classList.add('locked');

            if (selectedText === correctAnswer) {
                btn.classList.add('correct');
                dispatchGameEvent('CORRECT_ANSWER', team);
                setTimeout(loadNewQuestion, 800);
            } else {
                btn.classList.add('wrong');
                dispatchGameEvent('WRONG_ANSWER', team);
                setTimeout(loadNewQuestion, 1200); // 答錯給予多一點時間看正確答案
            }
        }

        function playAudio(url) {
            try { new Audio(url).play(); } catch(e) {}
        }

        function dispatchGameEvent(eventType, team) {
            const event = new CustomEvent('ITIP_GAME_EVENT', {
                detail: { type: eventType, team: team, coreGame: 'QuizBattle' }
            });
            document.dispatchEvent(event);
            
            if (typeof ProgressTracker !== 'undefined') {
                document.getElementById('score-board').innerText = `紅隊 ${ProgressTracker.redScore} : ${ProgressTracker.blueScore} 藍隊`;
            }
        }

        function goBack() { window.location.href = '../index.html'; }

        window.onload = () => {
            loadNewQuestion();
        };
    </script>
</body>
</html>
