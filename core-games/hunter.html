<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phonics Hunter Engine - ITIP 2.0</title>
    <style>
        /* ================= 核心測驗引擎基礎樣式 ================= */
        :root {
            --bg-color: #f0f4f8;
            --text-color: #2c3e50;
            --target-bg: #ffffff;
            --target-border: #cbd5e1;
            --correct-color: #26890C;
            --wrong-color: #E21B3C;
        }

        body { 
            margin: 0; height: 100vh; font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-color); display: flex; flex-direction: column;
            overflow: hidden; user-select: none; touch-action: none; /* 防止平板誤觸縮放 */
        }

        /* 頂部資訊列 */
        .game-header { 
            background: rgba(255, 255, 255, 0.95); padding: 15px 30px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; 
            justify-content: space-between; align-items: center; z-index: 100;
        }
        .back-btn { padding: 8px 16px; border: 1px solid #ccc; border-radius: 20px; background: white; cursor: pointer; font-weight: bold; }
        .status-board { display: flex; gap: 20px; font-size: 20px; font-weight: bold; }
        .active-team-red { color: #E21B3C; font-size: 24px; transition: 0.3s; }
        .active-team-blue { color: #1cb0f6; font-size: 24px; transition: 0.3s; }

        /* 遊戲區域 */
        #hunter-arena {
            position: relative; flex-grow: 1; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; z-index: 10;
        }

        /* 回合任務提示 */
        #target-hint-box {
            margin-top: 30px; padding: 15px 40px; background: rgba(0,0,0,0.7);
            color: white; border-radius: 30px; font-size: clamp(24px, 4vw, 36px);
            font-weight: 900; z-index: 20; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        /* 動態生成的捕捉物件 (基礎泡泡外觀) */
        .hunt-target {
            position: absolute; bottom: -100px;
            width: clamp(60px, 12vw, 100px); height: clamp(60px, 12vw, 100px);
            background-color: var(--target-bg); border: 4px solid var(--target-border);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: clamp(28px, 5vw, 42px); font-weight: 900; color: var(--text-color);
            cursor: crosshair; box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }

        .hunt-target:active { transform: scale(0.9); }

        /* 漂浮動畫 */
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-120vh) rotate(20deg); opacity: 1; }
        }

        /* 答對消失特效 */
        .hunt-target.popped {
            animation: pop 0.2s ease-out forwards !important; pointer-events: none;
            border-color: var(--correct-color); color: var(--correct-color);
        }
        @keyframes pop {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.5; }
            100% { transform: scale(0); opacity: 0; }
        }

        /* 答錯懲罰特效 */
        .hunt-target.wrong {
            animation: shake 0.3s ease-out !important; pointer-events: none;
            border-color: var(--wrong-color); color: var(--wrong-color); background: #ffebee;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-15px) rotate(-15deg); }
            75% { transform: translateX(15px) rotate(15deg); }
        }

        /* 回合切換遮罩 */
        #round-transition {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); display: flex; justify-content: center;
            align-items: center; font-size: 50px; font-weight: 900; z-index: 1000;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        #round-transition.active { opacity: 1; pointer-events: auto; }

        /* 主題特效層 */
        #theme-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
    </style>
</head>
<body>

    <div id="theme-layer"></div>

    <div class="game-header">
        <button class="back-btn" onclick="goBack()">⭠ 返回大廳</button>
        <div class="status-board">
            <div>當前回合: <span id="current-turn" class="active-team-red">紅隊</span></div>
            <div style="margin-left: 30px;">⏱️ <span id="timer">15</span>s</div>
        </div>
    </div>

    <div id="hunter-arena">
        <div id="target-hint-box">準備中...</div>
    </div>

    <div id="round-transition">換藍隊上場！</div>

    <script src="../js/progress.js"></script>
    <script src="../js/eventManager.js"></script>
    <script>
        // ================= 1. 資料初始化 =================
        let vocabData = JSON.parse(sessionStorage.getItem('itip_current_vocab')) || [];
        const selectedTheme = sessionStorage.getItem('itip_theme') || 'None';
        const arena = document.getElementById('hunter-arena');
        const hintBox = document.getElementById('target-hint-box');
        
        let currentTurn = 'red';
        let currentTargetLetter = "";
        let roundTimeLeft = 15; // 每個隊伍有 15 秒的時間狂點
        let spawnInterval = null;
        let timerInterval = null;
        let isRoundActive = false;

        // 確保防呆
        if (vocabData.length === 0) {
            vocabData = [{ english: 'apple', chinese: '蘋果' }, { english: 'boy', chinese: '男孩' }];
        }

        // ================= 2. 核心遊戲邏輯 =================

        // 啟動新回合
        function startRound() {
            // 隨機抽選本回合的目標 (取首字母為判斷基準)
            const randomItem = vocabData[Math.floor(Math.random() * vocabData.length)];
            currentTargetLetter = randomItem.english.charAt(0).toLowerCase();
            
            hintBox.innerHTML = `🎯 尋找開頭字母: <span style="color:#FFD700;">${currentTargetLetter.toUpperCase()}</span>`;
            
            roundTimeLeft = 15;
            document.getElementById('timer').innerText = roundTimeLeft;
            isRoundActive = true;

            // 啟動計時器
            timerInterval = setInterval(() => {
                roundTimeLeft--;
                document.getElementById('timer').innerText = roundTimeLeft;
                if (roundTimeLeft <= 0) endRound();
            }, 1000);

            // 啟動生成器 (每 0.7 秒生出一個目標)
            spawnInterval = setInterval(spawnObject, 700);
        }

        // 結束當前回合，切換隊伍
        function endRound() {
            isRoundActive = false;
            clearInterval(timerInterval);
            clearInterval(spawnInterval);

            // 清空畫面上的殘餘泡泡
            document.querySelectorAll('.hunt-target').forEach(el => el.remove());

            // 切換隊伍
            currentTurn = (currentTurn === 'red') ? 'blue' : 'red';
            const turnDisplay = document.getElementById('current-turn');
            turnDisplay.innerText = (currentTurn === 'red') ? '紅隊' : '藍隊';
            turnDisplay.className = `active-team-${currentTurn}`;

            // 顯示過場動畫
            const transitionScreen = document.getElementById('round-transition');
            transitionScreen.innerText = `換 ${currentTurn === 'red' ? '紅隊' : '藍隊'} 上場！`;
            transitionScreen.style.color = currentTurn === 'red' ? '#E21B3C' : '#1cb0f6';
            transitionScreen.classList.add('active');

            // 3 秒後開始下一回合
            setTimeout(() => {
                transitionScreen.classList.remove('active');
                startRound();
            }, 3000);
        }

        // 動態生成物件 (Spawner)
        function spawnObject() {
            if (!isRoundActive) return;

            const targetObj = document.createElement('div');
            targetObj.className = 'hunt-target';
            
            // 決定這個物件是「正確項目 (30%機率)」還是「干擾項目」
            const isCorrectItem = Math.random() < 0.35;
            let displayLetter = "";

            if (isCorrectItem) {
                displayLetter = currentTargetLetter;
            } else {
                const alphabet = "abcdefghijklmnopqrstuvwxyz";
                displayLetter = alphabet[Math.floor(Math.random() * alphabet.length)];
                // 確保干擾項不等於正確項目
                if (displayLetter === currentTargetLetter) displayLetter = "z"; 
            }

            // 隨機大小寫
            targetObj.innerText = Math.random() > 0.5 ? displayLetter.toUpperCase() : displayLetter.toLowerCase();
            targetObj.dataset.isCorrect = isCorrectItem; // 將對錯藏在 dataset 裡

            // 隨機 X 軸位置 (10% ~ 80%)
            targetObj.style.left = `${10 + Math.random() * 70}%`;
            
            // 隨機漂浮速度 (3秒 ~ 6秒)
            const duration = 3000 + Math.random() * 3000;
            targetObj.style.animation = `floatUp ${duration}ms linear forwards`;

            // 點擊事件
            targetObj.onpointerdown = (e) => handleHit(e, targetObj);

            // 動畫結束自動銷毀 (Garbage Collection)
            targetObj.addEventListener('animationend', (e) => {
                if (e.animationName === 'floatUp') targetObj.remove();
            });

            arena.appendChild(targetObj);
        }

        // 處理點擊判定
        function handleHit(event, element) {
            if (!isRoundActive || element.classList.contains('popped') || element.classList.contains('wrong')) return;

            // 根據剛剛綁定的 dataset 來判斷對錯
            const isMatch = element.dataset.isCorrect === 'true';

            if (isMatch) {
                element.classList.add('popped');
                playSound('correct');
                dispatchGameEvent('CORRECT_ANSWER', currentTurn);
            } else {
                element.classList.add('wrong');
                playSound('wrong');
                dispatchGameEvent('WRONG_ANSWER', currentTurn);
            }
        }

        // ================= 3. 系統通訊 (Event Emitter) =================
        function dispatchGameEvent(eventType, team) {
            const event = new CustomEvent('ITIP_GAME_EVENT', {
                detail: { type: eventType, team: team, coreGame: 'PhonicsHunter' }
            });
            document.dispatchEvent(event);
        }

        // ================= 4. 工具 =================
        function playSound(type) {
            try {
                let url = '';
                if (type === 'correct') url = 'https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3';
                else if (type === 'wrong') url = 'https://assets.mixkit.co/active_storage/sfx/2572/2572-preview.mp3';
                if(url) new Audio(url).play();
            } catch (e) {}
        }

        function goBack() { window.location.href = '../index.html?return=games'; }

        // 啟動遊戲 (先給3秒準備時間)
        window.onload = () => {
            const transitionScreen = document.getElementById('round-transition');
            transitionScreen.innerText = `準備開始！`;
            transitionScreen.classList.add('active');
            
            setTimeout(() => {
                transitionScreen.classList.remove('active');
                startRound();
            }, 2000);
        };
    </script>
</body>
</html>
