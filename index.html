<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITIP 2.0 - 遊戲大廳</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #2c3e50; color: white;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; margin: 0; padding-top: 50px;
        }
        h1 { color: #f1c40f; font-size: 48px; margin-bottom: 10px; }
        .subtitle { font-size: 18px; color: #bdc3c7; margin-bottom: 40px; }

        /* 設定面板區塊 */
        .setup-panel {
            background: rgba(255, 255, 255, 0.1); padding: 30px;
            border-radius: 15px; width: 80%; max-width: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .step-group { margin-bottom: 25px; }
        .step-title { font-size: 20px; font-weight: bold; margin-bottom: 10px; color: #3498db; }
        
        select, button {
            width: 100%; padding: 15px; font-size: 18px;
            border-radius: 8px; border: none; outline: none;
            cursor: pointer; font-weight: bold;
        }
        select { background: #ecf0f1; color: #2c3e50; margin-bottom: 10px; }
        
        /* 模式選擇按鈕 */
        .mode-options { display: flex; gap: 10px; }
        .mode-btn {
            flex: 1; background: #95a5a6; color: white; transition: 0.2s;
        }
        .mode-btn.active { background: #e74c3c; box-shadow: 0 4px 0 #c0392b; transform: translateY(-4px); }

        /* 開始按鈕 */
        .start-btn {
            background: #2ecc71; color: white; font-size: 24px;
            margin-top: 20px; box-shadow: 0 6px 0 #27ae60; transition: 0.1s;
        }
        .start-btn:active { transform: translateY(6px); box-shadow: 0 0 0 transparent; }
    </style>
</head>
<body>

    <h1>ITIP 2.0</h1>
    <div class="subtitle">讓遊戲接管課堂，老師喝口水吧！</div>

    <div class="setup-panel">
        <!-- 步驟 1：選擇教材 -->
        <div class="step-group">
            <div class="step-title">Step 1: 選擇今天的複習進度</div>
            <select id="book-select">
                <option value="">-- 請選擇課本 --</option>
                <option value="B001">Sounds Great 1</option>
                <option value="B002">Sounds Great 2</option>
            </select>
            <select id="unit-select">
                <option value="">-- 請先選擇課本 --</option>
                <!-- 這裡未來會透過 api.js 自動載入，目前先寫死作示範 -->
                <option value="U000">Alphabet (A to Z)</option>
                <option value="U001">Unit 1</option>
            </select>
        </div>

        <!-- 步驟 2：選擇教學模式 -->
        <div class="step-group">
            <div class="step-title">Step 2: 選擇輸入模式 (ESL 黃金三角)</div>
            <div class="mode-options">
                <button class="mode-btn" onclick="selectMode('text', this)">📝 看字選義</button>
                <button class="mode-btn active" onclick="selectMode('image', this)">🖼️ 看圖直覺</button>
                <button class="mode-btn" onclick="selectMode('audio', this)">🔊 聽音辨字</button>
            </div>
        </div>

        <!-- 步驟 3：選擇遊戲 -->
        <div class="step-group">
            <div class="step-title">Step 3: 選擇挑戰遊戲</div>
            <select id="game-select">
                <option value="core-games/quiz.html">🔥 雙打搶答 (四選一)</option>
                <option value="core-games/matching.html">⚔️ 雙打配對 (消除)</option>
            </select>
        </div>

        <button class="start-btn" onclick="startGame()">🚀 START GAME</button>
    </div>

    <script>
        // 預設模式為圖片
        let selectedMode = 'image';

        // 點擊切換模式的視覺效果與變數更新
        function selectMode(mode, btnElement) {
            selectedMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
        }

        function startGame() {
            const unit = document.getElementById('unit-select').value;
            const gameUrl = document.getElementById('game-select').value;

            if (!unit) {
                alert("請先選擇要複習的單元！");
                return;
            }

            // 1. 將老師選好的設定打包存入 sessionStorage
            const config = {
                unit_ID: unit,
                mode: selectedMode,
                winCondition: 'score', // 未來這裡可以接上 UI 選擇「時間制」或「分數制」
                winValue: 15
            };
            sessionStorage.setItem('itip_config', JSON.stringify(config));

            // ★ 2. 呼叫 api.js (這部分稍後會補上真實的 GAS 串接，目前直接跳轉) ★
            // ITIP_Data.prepareGameData(unit).then(() => { ... })
            
            // 3. 跳轉進入戰場
            window.location.href = gameUrl;
        }
    </script>
</body>
</html>
