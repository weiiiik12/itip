<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Speed Racing Matching - ITIP 1.0</title>
    <style>
        /* 全域防護 */
        body { 
            background-color: #141e30; font-family: 'Segoe UI', sans-serif; 
            margin: 0; display: flex; flex-direction: column; height: 100vh; 
            overflow: hidden; touch-action: none; user-select: none; -webkit-user-select: none;
            color: white;
        }

        /* 標題與設定 */
        .game-header { 
            background: rgba(0, 0, 0, 0.5); padding: 10px 20px; display: flex; 
            justify-content: space-between; align-items: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 10; border-bottom: 2px solid #333;
        }
        .back-btn { padding: 8px 15px; border-radius: 20px; border: none; background: rgba(255,255,255,0.2); color: white; cursor: pointer; font-weight: bold; transition: 0.2s;}
        .back-btn:hover { background: rgba(255,255,255,0.4); }

        /* 🏎️ 極速賽道區塊 */
        #track-arena { 
            width: 100%; height: 200px; 
            display: flex; flex-direction: column; justify-content: space-evenly;
            background: #2f3640; border-bottom: 6px solid #192a56; 
            position: relative; padding: 10px 0; box-shadow: inset 0 -10px 20px rgba(0,0,0,0.4);
        }
        
        .track {
            width: 90%; height: 60px; margin: 0 auto; background: #718093;
            border-radius: 30px; position: relative; border: 2px dashed #dcdde1;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.3); display: flex; align-items: center;
        }

        /* 終點線 */
        .finish-line {
            position: absolute; right: 5%; top: -5px; bottom: -5px; width: 30px;
            background: repeating-linear-gradient(45deg, white, white 8px, black 8px, black 16px);
            border-radius: 5px; box-shadow: -5px 0 10px rgba(0,0,0,0.3); z-index: 1;
        }

        /* 賽車與人物 */
        .avatar {
            position: absolute; left: 0%; top: 50%; transform: translateY(-50%);
            font-size: 50px; z-index: 3; transition: left 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5)); display: flex; align-items: center; gap: 10px;
        }
        .avatar span {
            font-size: 16px; font-weight: bold; background: rgba(0,0,0,0.7); padding: 2px 8px;
            border-radius: 10px; color: white;
        }

        /* 氮氣加速特效 (Combo觸發) */
        .nitro-boost::after {
            content: '🔥'; position: absolute; left: -40px; font-size: 40px;
            animation: fireBlast 0.5s ease-out forwards; pointer-events: none;
        }
        @keyframes fireBlast { 0% { transform: scale(0.5) translateX(0); opacity: 1; } 100% { transform: scale(1.5) translateX(-30px); opacity: 0; } }

        /* 遊戲操作區 */
        #play-area { flex-grow: 1; display: flex; width: 100%; background: #0f1722; }
        .team-side { flex: 1; display: flex; flex-direction: column; padding: 15px; gap: 15px; justify-content: space-evenly; position: relative;}
        #red-side { border-right: 4px solid #000; background: rgba(255, 71, 87, 0.05); }
        #blue-side { background: rgba(30, 144, 255, 0.05); }
        
        /* 卡片列與卡片 */
        .card-row { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; height: 45%; align-items: center; }
        .match-card { 
            flex: 1; min-width: 90px; max-width: 150px; aspect-ratio: 2/1; 
            background: #1e272e; border: 3px solid #576574; border-radius: 12px; 
            display: flex; justify-content: center; align-items: center; 
            font-size: clamp(16px, 2.5vw, 28px); font-weight: bold; cursor: pointer; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.5); transition: all 0.2s; text-align: center; padding: 5px; color: white;
        }
        .match-card img { max-width: 90%; max-height: 90%; object-fit: contain; pointer-events: none; }
        
        /* 狀態特效 */
        .selected-red { border-color: #ff4757 !important; background: rgba(255, 71, 87, 0.2) !important; transform: scale(1.08); box-shadow: 0 0 15px #ff4757; }
        .selected-blue { border-color: #1e90ff !important; background: rgba(30, 144, 255, 0.2) !important; transform: scale(1.08); box-shadow: 0 0 15px #1e90ff; }
        .matched { transform: scale(0.5); opacity: 0; pointer-events: none; }
        .error { animation: cardShake 0.3s; border-color: #ff3366 !important; background: rgba(255,51,102,0.3) !important;}
        @keyframes cardShake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-8px);} 75%{transform:translateX(8px);} }

        /* 浮動字體 (COMBO / SPEED UP) */
        .floating-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 50px; font-weight: 900; pointer-events: none; z-index: 10;
            text-shadow: 0 5px 15px rgba(0,0,0,0.8); opacity: 0;
        }
        .float-anim { animation: floatTextAnim 0.8s ease-out forwards; }
        @keyframes floatTextAnim { 0% { transform: translate(-50%, -20%) scale(0.5); opacity: 0; } 20% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; } 100% { transform: translate(-50%, -80%) scale(1); opacity: 0; } }

        /* 設定與結算遮罩 */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; display:flex; flex-direction:column; justify-content:center; align-items:center; color: #333; }
        .setup-box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); width: 90%; max-width: 400px; text-align: left; }
        select { width: 100%; padding: 12px; margin-bottom: 20px; font-size: 16px; border-radius: 8px; }
        .start-btn { width: 100%; padding: 15px; font-size: 20px; background: #ff4757; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(255,71,87,0.4); }
    </style>
</head>
<body>

    <div id="setup-screen" class="modal">
        <div class="setup-box">
            <h2 style="margin-top:0; text-align: center;">🏎️ 賽道配對設定 🏎️</h2>
            <label style="display:block; font-weight:bold;">上半部卡片：</label>
            <select id="top-type">
                <option value="english">英文</option>
                <option value="image">圖片</option>
                <option value="chinese">中文</option>
                <option value="audio">聲音 🔊</option>
            </select>
            <label style="display:block; font-weight:bold;">下半部卡片：</label>
            <select id="bottom-type">
                <option value="chinese">中文</option>
                <option value="image">圖片</option>
                <option value="english">英文</option>
                <option value="audio">聲音 🔊</option>
            </select>
            <label style="display:block; font-weight:bold;">賽道長度 (需配對成功次數)：</label>
            <select id="win-target">
                <option value="5">短距離 (5次)</option>
                <option value="10" selected>標準賽 (10次)</option>
                <option value="15">馬拉松 (15次)</option>
            </select>
            <button class="start-btn" onclick="startGame()">啟動引擎！</button>
        </div>
    </div>

    <div id="game-over-screen" class="modal" style="display:none; color: white;">
        <h1 id="winner-text" style="font-size: 70px; margin-bottom: 10px; text-shadow: 0 5px 20px rgba(255,255,255,0.3);"></h1>
        <p id="win-reason" style="font-size: 24px; color: #ccc; margin-bottom: 40px;"></p>
        <button class="start-btn" style="max-width: 300px; background: #1e90ff;" onclick="location.reload()">再戰一局</button>
    </div>

    <div class="game-header">
        <button class="back-btn" onclick="window.history.back()">⭠ 返回</button>
        <div style="font-size: 20px; font-weight: 900; color: #f1c40f; letter-spacing: 2px;">SPEED RELAY RACE</div>
        <div style="width: 80px;"></div>
    </div>

    <!-- 賽道區塊 -->
    <div id="track-arena">
        <!-- 紅隊賽道 -->
        <div class="track">
            <div class="finish-line"></div>
            <div class="avatar" id="avatar-red">🏎️<span style="color: #ff4757;">RED</span></div>
        </div>
        <!-- 藍隊賽道 -->
        <div class="track">
            <div class="finish-line"></div>
            <div class="avatar" id="avatar-blue">🚙<span style="color: #1e90ff;">BLUE</span></div>
        </div>
    </div>
    
    <!-- 遊戲操作區 -->
    <div id="play-area">
        <div class="team-side" id="red-side">
            <div id="red-floating" class="floating-text" style="color: #ff4757;"></div>
            <div class="card-row" id="red-top-row"></div>
            <div class="card-row" id="red-bot-row"></div>
        </div>
        <div class="team-side" id="blue-side">
            <div id="blue-floating" class="floating-text" style="color: #1e90ff;"></div>
            <div class="card-row" id="blue-top-row"></div>
            <div class="card-row" id="blue-bot-row"></div>
        </div>
    </div>

<script>
    let rawData = JSON.parse(sessionStorage.getItem('itip_current_vocab')) || [];
    if(rawData.length === 0) { alert("找不到單字，請從目錄進入！"); window.history.back(); }
    let vocabList = rawData.filter(item => item.english && item.chinese);
    
    // 兩隊進度 (0 到 100)
    let progress = { red: 0, blue: 0 }; 
    let isGameOver = false;
    let selected = { red: null, blue: null };
    let config = { top: 'english', bot: 'chinese', target: 10 };
    
    // Combo 計時器紀錄
    let lastMatchTime = { red: 0, blue: 0 };

    function startGame() {
        config.top = document.getElementById('top-type').value;
        config.bot = document.getElementById('bottom-type').value;
        config.target = parseInt(document.getElementById('win-target').value);
        document.getElementById('setup-screen').style.display = 'none';

        buildCards('red');
        buildCards('blue');
    }

    function fixPath(url) { return (!url || url.startsWith('http') || url.startsWith('../') || url.startsWith('/')) ? url : '../' + url; }
    
    function getContent(item, type) {
        if(type === 'image') return item.image_URL ? `<img src="${fixPath(item.image_URL)}">` : "無圖";
        if(type === 'english') return item.english_image ? `<img src="${fixPath(item.english_image)}">` : item.english;
        if(type === 'audio') return "🔊"; 
        return item.chinese;
    }

    function speakWord(word) {
        let msg = new SpeechSynthesisUtterance(word); msg.lang = 'en-US'; window.speechSynthesis.speak(msg);
    }

    function buildCards(team) {
        const topRow = document.getElementById(`${team}-top-row`);
        const botRow = document.getElementById(`${team}-bot-row`);
        topRow.innerHTML = ''; botRow.innerHTML = '';
        for(let i=0; i<4; i++) spawnNewPair(team, topRow, botRow);
    }

    function spawnNewPair(team, topRow, botRow, replaceTopCard = null, replaceBotCard = null) {
        let randomItem = vocabList[Math.floor(Math.random() * vocabList.length)];
        let pairId = randomItem.english; 

        let topHTML = getContent(randomItem, config.top);
        let botHTML = getContent(randomItem, config.bot);

        if (replaceTopCard && replaceBotCard) {
            replaceTopCard.innerHTML = topHTML;
            replaceTopCard.dataset.pair = pairId;
            replaceTopCard.classList.remove('matched', `selected-${team}`);
            
            replaceBotCard.innerHTML = botHTML;
            replaceBotCard.dataset.pair = pairId;
            replaceBotCard.classList.remove('matched', `selected-${team}`);
            return;
        }

        let topCard = document.createElement('div');
        topCard.className = 'match-card';
        topCard.innerHTML = topHTML;
        topCard.dataset.pair = pairId; 
        
        let botCard = document.createElement('div');
        botCard.className = 'match-card';
        botCard.innerHTML = botHTML;
        botCard.dataset.pair = pairId; 

        topCard.addEventListener('pointerdown', function() { handleCardTap(this, team); });
        botCard.addEventListener('pointerdown', function() { handleCardTap(this, team); });

        topRow.children.length === 0 ? topRow.appendChild(topCard) : topRow.insertBefore(topCard, topRow.children[Math.floor(Math.random() * topRow.children.length)]);
        botRow.children.length === 0 ? botRow.appendChild(botCard) : botRow.insertBefore(botCard, botRow.children[Math.floor(Math.random() * botRow.children.length)]);
    }

    function handleCardTap(card, team) {
        if (isGameOver || card.classList.contains('matched')) return;

        let cardType = card.parentElement.id.includes('top') ? config.top : config.bot;
        if (cardType === 'audio') {
            let item = vocabList.find(x => x.english === card.dataset.pair);
            if (item && item.audio_URL) {
                playSound(fixPath(item.audio_URL));
            } else {
                speakWord(card.dataset.pair); 
            }
        }

        if (selected[team] === card) {
            card.classList.remove(`selected-${team}`);
            selected[team] = null;
            return;
        }

        if (!selected[team]) {
            selected[team] = card;
            card.classList.add(`selected-${team}`);
        } else {
            let card1 = selected[team];
            let card2 = card;
            
            if(card1.parentElement.id === card2.parentElement.id) {
                card1.classList.remove(`selected-${team}`);
                selected[team] = card2;
                card2.classList.add(`selected-${team}`);
                return;
            }

            if (card1.dataset.pair === card2.dataset.pair) {
                // 【配對成功】
                card1.classList.add('matched');
                card2.classList.add('matched');
                
                let now = Date.now();
                let isCombo = (now - lastMatchTime[team]) < 3000 && lastMatchTime[team] !== 0; // 3秒內配對算Combo
                lastMatchTime[team] = now;

                if (isCombo) {
                    showFloatingText(team, "NITRO BOOST 🔥");
                    moveAvatar(team, 2); // Combo 兩倍速前進
                } else {
                    showFloatingText(team, "SPEED UP !");
                    moveAvatar(team, 1); 
                }

                playSound('https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3');

                setTimeout(() => {
                    let topR = document.getElementById(`${team}-top-row`);
                    let botR = document.getElementById(`${team}-bot-row`);
                    spawnNewPair(team, topR, botR, card1.parentElement.id.includes('top') ? card1 : card2, card1.parentElement.id.includes('bot') ? card1 : card2);
                }, 400);

            } else {
                // 【配對失敗】
                card1.classList.add('error');
                card2.classList.add('error');
                lastMatchTime[team] = 0; 
                
                playSound('https://assets.mixkit.co/active_storage/sfx/2572/2572-preview.mp3');

                setTimeout(() => {
                    card1.classList.remove('error', `selected-${team}`);
                    card2.classList.remove('error', `selected-${team}`);
                }, 400);
            }
            selected[team] = null;
        }
    }

    function showFloatingText(team, text) {
        let el = document.getElementById(`${team}-floating`);
        el.innerText = text;
        el.classList.remove('float-anim');
        void el.offsetWidth; 
        el.classList.add('float-anim');
    }

    // 移動賽車
    function moveAvatar(team, multiplier) {
        if (isGameOver) return;
        
        // 根據設定的勝利目標計算每次前進的百分比
        let step = (100 / config.target) * multiplier; 
        progress[team] += step;
        
        if(progress[team] > 90) progress[team] = 90; // 90% 就是終點線的位置
        
        let avatarEl = document.getElementById(`avatar-${team}`);
        avatarEl.style.left = `${progress[team]}%`;

        // 如果是 Combo 觸發火焰特效
        if (multiplier > 1) {
            avatarEl.classList.add('nitro-boost');
            setTimeout(() => avatarEl.classList.remove('nitro-boost'), 500);
        }

        // 抵達終點判定
        if (progress[team] >= 90) {
            endGame(team);
        }
    }

    function endGame(winningTeam) {
        isGameOver = true;
        
        let winnerStr = "";
        let reasonStr = "率先衝過終點線，贏得比賽！";

        if (winningTeam === 'red') {
            winnerStr = "<span style='color:#ff4757;'>RED TEAM 獲勝！🏎️💨</span>";
        } else {
            winnerStr = "<span style='color:#1e90ff;'>BLUE TEAM 獲勝！🚙💨</span>";
        } 

        document.getElementById('winner-text').innerHTML = winnerStr;
        document.getElementById('win-reason').innerText = reasonStr;
        document.getElementById('game-over-screen').style.display = 'flex';
    }

    function playSound(url) { try { new Audio(url).play(); } catch(e){} }
</script>
</body>
</html>
