<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz Battle - ITIP 1.0</title>
    <style>
        /* 全域防護：防止多點觸控時螢幕亂縮放或滑動 */
        body { 
            background-color: #f0f4f8; font-family: 'Segoe UI', sans-serif; 
            margin: 0; display: flex; flex-direction: column; height: 100vh; 
            overflow: hidden; touch-action: none; user-select: none; -webkit-user-select: none; 
        }

        /* 標題與設定 */
        .game-header { 
            background: white; padding: 10px 20px; display: flex; 
            justify-content: space-between; align-items: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 10; 
        }
        .back-btn { padding: 8px 15px; border-radius: 20px; border: 1px solid #ccc; background: white; cursor: pointer; font-weight: bold; }
        .score-board { font-size: 28px; font-weight: 900; }
        .score-red { color: #E21B3C; margin-right: 20px; }
        .score-blue { color: #1cb0f6; margin-left: 20px; }

        /* 左右分屏競技場 */
        #game-arena { flex-grow: 1; display: flex; width: 100%; }
        .team-zone { 
            flex: 1; display: flex; flex-direction: column; padding: 20px; 
            justify-content: space-between; position: relative;
        }
        #red-zone { border-right: 4px solid #333; background: rgba(226, 27, 60, 0.05); }
        #blue-zone { background: rgba(28, 176, 246, 0.05); }

        /* 題目區塊 */
        .question-box {
            height: 35%; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: white; border-radius: 20px; box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            font-size: 50px; font-weight: 900; text-align: center; margin-bottom: 20px;
            position: relative; padding: 10px; word-break: break-word;
        }
        .question-box img { max-height: 85%; max-width: 90%; object-fit: contain; border-radius: 10px; }

        /* 回饋動畫 (⭕ 與 ❌) */
        .feedback-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            font-size: 150px; opacity: 0; pointer-events: none; z-index: 5;
            transition: opacity 0.2s, transform 0.2s; transform: scale(0.5);
        }
        .show-feedback { opacity: 1; transform: scale(1); }

        /* 四選一按鈕網格 */
        .options-grid {
            display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
            gap: 15px; height: 60%;
        }
        .option-btn {
            background: white; border: 4px solid #ccc; border-radius: 15px;
            font-size: clamp(20px, 3vw, 36px); font-weight: bold; cursor: pointer;
            box-shadow: 0 6px 0 #ccc; display: flex; justify-content: center; align-items: center;
            transition: transform 0.1s, box-shadow 0.1s, background-color 0.2s; text-align: center; padding: 10px;
        }
        .option-btn img { max-width: 90%; max-height: 90%; object-fit: contain; pointer-events: none; }
        .option-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #ccc; }
        
        /* 答題狀態與防呆鎖定 */
        .team-zone.locked { pointer-events: none; } 
        .option-btn.correct { background: #a5d6a7 !important; border-color: #2e7d32 !important; box-shadow: 0 6px 0 #2e7d32 !important; color: #1b5e20 !important; }
        .option-btn.wrong { background: #ef9a9a !important; border-color: #c62828 !important; box-shadow: 0 6px 0 #c62828 !important; color: #b71c1c !important; animation: shake 0.3s; }
        @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-10px);} 75%{transform:translateX(10px);} }
        
        #red-zone .option-btn { color: #E21B3C; }
        #blue-zone .option-btn { color: #1cb0f6; }

        /* 設定彈窗樣式 (仿照 matching) */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.95); z-index:1000; display:flex; flex-direction:column; justify-content:center; align-items:center; }
        .setup-box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 90%; max-width: 400px; text-align: center; }
        select { width: 100%; padding: 12px; margin-bottom: 20px; font-size: 16px; border-radius: 8px; }
        .start-btn { width: 100%; padding: 15px; font-size: 20px; background: #26890C; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <!-- 1. 設定畫面 (仿照 matching 的多感官選單) -->
    <div id="setup-screen" class="modal">
        <div class="setup-box">
            <h2 style="margin-top:0;">📝 選擇題對決設定 📝</h2>
            <label style="display:block; text-align:left; font-weight:bold;">題目類型 (上方顯示)：</label>
            <select id="q-type">
                <option value="english">英文</option>
                <option value="image">圖片</option>
                <option value="chinese">中文</option>
                <option value="audio">聲音 🔊</option>
            </select>
            <label style="display:block; text-align:left; font-weight:bold;">選項類型 (下方按鈕)：</label>
            <select id="opt-type">
                <option value="chinese">中文</option>
                <option value="english">英文</option>
                <option value="image">圖片</option>
            </select>
            <button class="start-btn" onclick="startQuiz()">開始無限對決！</button>
        </div>
    </div>

    <!-- 頂部資訊 (無時間限制) -->
    <div class="game-header">
        <button class="back-btn" onclick="window.history.back()">⭠ 返回</button>
        <div class="score-board">
            <span class="score-red">Red: <span id="score-red-text">0</span></span>
            ⚔️
            <span class="score-blue">Blue: <span id="score-blue-text">0</span></span>
        </div>
        <div style="width: 80px;"></div>
    </div>

    <!-- 遊戲主區塊：左右獨立分屏 -->
    <div id="game-arena">
        <!-- 紅隊 -->
        <div id="red-zone" class="team-zone">
            <div class="question-box" id="red-question">
                <div id="red-q-content">?</div>
                <div class="feedback-overlay" id="red-feedback"></div>
            </div>
            <div class="options-grid" id="red-options"></div>
        </div>
        
        <!-- 藍隊 -->
        <div id="blue-zone" class="team-zone">
            <div class="question-box" id="blue-question">
                <div id="blue-q-content">?</div>
                <div class="feedback-overlay" id="blue-feedback"></div>
            </div>
            <div class="options-grid" id="blue-options"></div>
        </div>
    </div>

<script>
    let rawData = JSON.parse(sessionStorage.getItem('itip_current_vocab')) || [];
    if(rawData.length < 4) {
        alert("本單元有效單字不足 4 個，無法產生四選一選項！");
        window.history.back();
    }

    let vocabList = rawData.filter(item => item.english && item.chinese);
    
    let state = {
        red: { score: 0, currentItem: null },
        blue: { score: 0, currentItem: null }
    };

    let config = {
        qType: 'english',
        optType: 'chinese'
    };

    function fixPath(url) { 
        return (!url || url.startsWith('http') || url.startsWith('../') || url.startsWith('/')) ? url : '../' + url; 
    }

    function playSound(type) {
        const url = type === 'correct' 
            ? 'https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3' 
            : 'https://assets.mixkit.co/active_storage/sfx/2572/2572-preview.mp3';
        try { new Audio(url).play(); } catch(e) {}
    }

    function speakWord(word) {
        let msg = new SpeechSynthesisUtterance(word);
        msg.lang = 'en-US'; 
        window.speechSynthesis.speak(msg);
    }

    // 點擊開始遊戲
    function startQuiz() {
        config.qType = document.getElementById('q-type').value;
        config.optType = document.getElementById('opt-type').value;
        document.getElementById('setup-screen').style.display = 'none';

        loadNextQuestion('red');
        loadNextQuestion('blue');
    }

    // 渲染內容對應函式
    function renderContent(item, type) {
        if (type === 'image') {
            return item.image_URL ? `<img src="${fixPath(item.image_URL)}">` : "無圖";
        }
        if (type === 'english') {
            return item.english_image ? `<img src="${fixPath(item.english_image)}">` : item.english;
        }
        if (type === 'audio') {
            return "🔊 點我聽發音";
        }
        return item.chinese; // chinese
    }

    // 載入下一題
    function loadNextQuestion(team) {
        document.getElementById(`${team}-zone`).classList.remove('locked');
        document.getElementById(`${team}-feedback`).classList.remove('show-feedback');
        
        let correctItem = vocabList[Math.floor(Math.random() * vocabList.length)];
        state[team].currentItem = correctItem;

        // 顯示上方題目
        let qContent = document.getElementById(`${team}-q-content`);
        qContent.innerHTML = renderContent(correctItem, config.qType);

        // 如果剛好選到音檔，自動唸一次
        if (config.qType === 'audio') {
            if (correctItem.audio_URL) {
                try { new Audio(fixPath(correctItem.audio_URL)).play(); } catch(e) { speakWord(correctItem.english); }
            } else {
                speakWord(correctItem.english);
            }
            // 讓上方題目也能點擊再聽一次
            qContent.style.cursor = 'pointer';
            qContent.onclick = () => {
                if (correctItem.audio_URL) {
                    try { new Audio(fixPath(correctItem.audio_URL)).play(); } catch(e) { speakWord(correctItem.english); }
                } else {
                    speakWord(correctItem.english);
                }
            };
        } else {
            qContent.style.cursor = 'default';
            qContent.onclick = null;
        }

        // 產生 4 個不重複選項
        let options = [correctItem];
        while (options.length < 4) {
            let randomItem = vocabList[Math.floor(Math.random() * vocabList.length)];
            if (!options.includes(randomItem)) {
                options.push(randomItem);
            }
        }
        options.sort(() => Math.random() - 0.5);

        // 渲染按鈕
        const optionsContainer = document.getElementById(`${team}-options`);
        optionsContainer.innerHTML = ''; 
        
        options.forEach(opt => {
            let btn = document.createElement('div');
            btn.className = 'option-btn';
            btn.innerHTML = renderContent(opt, config.optType);
            
            btn.addEventListener('pointerdown', () => handleAnswer(team, btn, opt));
            optionsContainer.appendChild(btn);
        });
    }

    // 處理作答
    function handleAnswer(team, btnElement, selectedItem) {
        let correctItem = state[team].currentItem;
        let isCorrect = (selectedItem.english === correctItem.english);
        let zone = document.getElementById(`${team}-zone`);
        let feedback = document.getElementById(`${team}-feedback`);
        
        zone.classList.add('locked'); 

        if (isCorrect) {
            btnElement.classList.add('correct');
            feedback.innerText = '⭕';
            feedback.style.color = '#4caf50';
            playSound('correct');
            
            state[team].score += 1;
            document.getElementById(`score-${team}-text`).innerText = state[team].score;
        } else {
            btnElement.classList.add('wrong');
            feedback.innerText = '❌';
            feedback.style.color = '#f44336';
            playSound('wrong');
            
            // 找出正確答案按鈕並標綠
            let allBtns = document.getElementById(`${team}-options`).children;
            for(let b of allBtns) {
                // 比對內容或直接核對
                if (config.optType === 'chinese' && b.innerText === correctItem.chinese) {
                    b.classList.add('correct');
                } else if (config.optType === 'english' && b.innerText === correctItem.english) {
                    b.classList.add('correct');
                }
            }
        }

        feedback.classList.add('show-feedback');

        // 無時間限制，答對/答錯後 1.5 秒自動進入下一題，給老師充裕時間批改聯絡簿
        setTimeout(() => {
            loadNextQuestion(team);
        }, 1500);
    }
</script>
</body>
</html>
