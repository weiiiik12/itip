<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>字母火車競賽 - ITIP 1.0</title>
    <style>
        body { margin: 0; background: #87CEEB; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* 標題與設定 (新增：與其他遊戲統一的 Header) */
        .game-header { 
            background: white; padding: 10px 20px; display: flex; 
            justify-content: space-between; align-items: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 10; 
        }
        .back-btn { padding: 8px 15px; border-radius: 20px; border: 1px solid #ccc; background: white; cursor: pointer; font-weight: bold; transition: 0.2s;}
        .back-btn:hover { background: #f0f0f0; }

        /* 彈窗樣式 (共用) */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:999; display:flex; justify-content:center; align-items:center; }
        .modal-content { background: white; padding: 40px; border-radius: 30px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        #game-arena { flex-grow: 1; display: flex; padding: 10px; gap: 10px; height: 100%; }
        .team-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .team-box { width: 95%; height: 55vh; border: 4px solid #333; border-radius: 20px; background: rgba(255,255,255,0.4); padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        .train-tracks { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin-top: 10px; }
        .car-empty { width: 45px; height: 55px; border: 2px dashed #666; background: #eee; border-radius: 5px; display: flex; justify-content: center; align-items: center; }
        .car-filled { width: 45px; height: 55px; border: 2px solid #333; background: #FFD700; display: flex; justify-content: center; align-items: center; font-size: 25px; font-weight: bold; border-radius: 5px; }

        .pond { width: 95%; height: 35vh; background: #e0f7fa; border: 3px solid #00796b; border-radius: 15px; display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 8px; padding: 10px; margin-top: 10px; }
        .letter-btn { width: 55px; height: 55px; background: #ff9800; color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 28px; font-weight: bold; }
        .error { animation: shake 0.3s; background: #ff3366 !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body>

    <!-- 頂部資訊 (新增) -->
    <div class="game-header">
        <button class="back-btn" onclick="window.history.back()">⭠ 返回</button>
        <div style="font-size: 20px; font-weight: 900; color: #333; letter-spacing: 2px;">ALPHABET TRAIN</div>
        <div style="width: 80px;"></div>
    </div>

    <!-- 開始選單 -->
    <div id="start-overlay" class="modal">
        <div class="modal-content">
            <h2 style="font-size:30px;">🚂 字母火車準備出發！</h2>
            <select id="mode-select" style="padding:10px; font-size:16px;"><option value="coop">合作模式</option><option value="vs">競賽模式</option></select>
            <select id="case-select" style="padding:10px; font-size:16px;"><option value="upper">大寫 A-Z</option><option value="lower">小寫 a-z</option></select>
            <br><br><button onclick="startGame()" style="padding:15px 40px; font-size:20px; cursor:pointer; background:#ff3366; color:white; border:none; border-radius:10px;">開始比賽！</button>
        </div>
    </div>

    <!-- 結束畫面 -->
    <div id="finish-overlay" class="modal" style="display:none;">
        <div class="modal-content">
            <div style="font-size:80px;">🏆</div>
            <h2 id="winner-text" style="font-size:40px;">獲勝！</h2>
            <p id="time-text" style="font-size:24px; color:#555;"></p>
            
            <button onclick="goBack()" style="padding:15px 30px; font-size:18px; cursor:pointer; background:#95a5a6; color:white; border:none; border-radius:10px;">返回教材頁</button>
            <button onclick="location.reload()" style="padding:15px 30px; font-size:18px; cursor:pointer; background:#27ae60; color:white; border:none; border-radius:10px; margin-left:10px;">再玩一次</button>
        </div>
    </div>

    <div id="game-arena">
        <div class="team-container" id="red-side">
            <div class="team-box"><h2 style="color:red; margin: 0 0 10px 0;">🚂 紅隊</h2><div class="train-tracks" id="tracks-red"></div></div>
            <div class="pond" id="pond-red"></div>
        </div>
        <div class="team-container" id="blue-side">
            <div class="team-box"><h2 style="color:blue; margin: 0 0 10px 0;">🚂 藍隊</h2><div class="train-tracks" id="tracks-blue"></div></div>
            <div class="pond" id="pond-blue"></div>
        </div>
    </div>

    <script>
        let currentAlphabet, gameStarted = false, startTime;
        let finished = { red: false, blue: false };

        function startGame() {
            const mode = document.getElementById('mode-select').value;
            const caseType = document.getElementById('case-select').value;
            const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
            currentAlphabet = (caseType === 'upper') ? alphabet : alphabet.map(c => c.toLowerCase());
            
            // 初始化軌道
            ['red', 'blue'].forEach(t => {
                const tr = document.getElementById('tracks-' + t);
                tr.innerHTML = '<div class="car-empty">🚂</div>';
                for(let i=0; i<26; i++) tr.innerHTML += `<div class="car-empty" id="${t}-car-${i}"></div>`;
            });
            
            document.getElementById('blue-side').style.display = (mode === 'coop') ? 'none' : 'flex';
            document.getElementById('start-overlay').style.display = 'none';
            
            startTime = new Date();
            gameStarted = true;
            renderPond('red');
            if(mode === 'vs') renderPond('blue');
        }

        function renderPond(team) {
            const pond = document.getElementById('pond-' + team);
            let shuffled = [...currentAlphabet].sort(() => Math.random() - 0.5);
            shuffled.forEach(char => {
                const btn = document.createElement('div');
                btn.className = 'letter-btn';
                btn.innerText = char;
                btn.onclick = (e) => handleLetterClick(char, team, e.target);
                pond.appendChild(btn);
            });
        }

        let scores = { red: 0, blue: 0 };
        function handleLetterClick(char, team, btn) {
            if(!gameStarted) return;
            if (char === currentAlphabet[scores[team]]) {
                const car = document.getElementById(`${team}-car-${scores[team]}`);
                car.className = 'car-filled';
                car.innerText = char;
                new Audio('https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3').play();
                scores[team]++;
                btn.style.visibility = 'hidden';
                
                if (scores[team] === 26) {
                    showFinish(team);
                }
            } else {
                btn.classList.add('error');
                new Audio('https://assets.mixkit.co/active_storage/sfx/2572/2572-preview.mp3').play();
                setTimeout(() => btn.classList.remove('error'), 300);
            }
        }

        function showFinish(winner) {
            gameStarted = false;
            const duration = Math.floor((new Date() - startTime) / 1000);
            document.getElementById('winner-text').innerText = (winner === 'red' ? "紅隊" : "藍隊") + " 獲勝！";
            document.getElementById('time-text').innerText = `總耗時：${duration} 秒`;
            document.getElementById('finish-overlay').style.display = 'flex';
        }
        function goBack() {
            window.location.href = '../index.html?return=games';
        }
    </script>
</body>
</html>
